<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030c1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sharpline" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>Sharpline</title>
    <script>
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.style.backgroundColor = dark ? '#030c1a' : '#fdf8f0';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', dark ? '#030c1a' : '#ffffff');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
